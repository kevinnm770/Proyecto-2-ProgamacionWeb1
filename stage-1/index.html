<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav>
        <h1>Batalla Pokémon | Zona de emparejamiento</h1>
    </nav>
    <main>
        <div id="trainer_card">
            <div id="info_trainer">
                <span>ENTRENADOR</span>
                <h2 id="nameTrainer"></h2>

                <h4 id="cityTrainer"></h4>
                <h4 id="PokemonNameTrainer"></h4>
            </div>
            <div id="phrase_trainer">
                <p></p>
            </div>
            <div id="move_main">
                <span>Movimiento especial</span>
                <h3 id="name_MoveMain"></h3>
            </div>
        </div>

        <div class="battle_vs">
            <div class="Pokemon_card" id="MyPokemon">
                <div class="head">
                    <h3 id="namePokemon">DRUDI</h3>
                    <div class="container_types" id="tipos_pokemon" style="display: none;">
                        <!-- Cargado dinamicamente -->
                    </div>
                </div>

                <div class="img_container_pokemon">
                    <img id="MyPokemon_img" src="" alt="">
                </div>

                <div id="info_MyPokemon">
                    <ul class="stats" id="stats_myPokemon">
                        <!-- Cargado dinamicamente -->
                    </ul>

                    <hr>

                    <h5>Movimientos</h5>

                    <ul class="moves" id="moves_myPokemon">
                        <!-- Cargado dinamicamente -->
                    </ul>
                </div>
            </div>

            <span>VS</span>

            <div class="Pokemon_card" id="enemy">
                <div class="head">
                    <input type="text" id="pokemon_name_rival" placeholder="Escribe el nombre del pokémon rival">
                    <div class="container_types" id="tipos_pokemon_rival" style="display: none;">
                        <!-- Cargado dinamicamente -->
                    </div>
                </div>

                <div id="mensaje">
                    <h3>Sin Pokémon seleccionado</h3>
                </div>

                <div id="espera" style="display: none;">
                    <h3>Buscando ...</h3>
                </div>

                <div id="info_pokemon" style="display: none;">
                    <div class="img_container_pokemon">
                        <img id="pokemon_rival" src="" alt="Pokemon rival">
                    </div>

                    <ul class="stats" id="stats_rival">
                        <!-- Cargado dinamicamente -->
                    </ul>

                    <hr>

                    <h5>Movimientos</h5>

                    <ul class="moves" id="moves_rival">
                        <!-- Cargado dinamicamente -->
                    </ul>
                </div>
            </div>
        </div>
        <div class="container_btn">
            <button id="btn_inicio" onclick="IniciarBatalla()">!A la batalla!</button>
        </div>
        
    </main>

    <script src="api.js"></script>
    <script src="../trainer.config.js"></script>
    <script src="main.js"></script>
</body>
</html>
